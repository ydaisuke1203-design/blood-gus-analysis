<!doctype html>

<html lang="ja">

<head>

    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>血液ガス分析（保存なし）</title>

    <style>
        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            margin: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 900px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #333;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 14px;
            font-size: 16px;
        }

        .results {
            white-space: pre-wrap;
            background: #f6f7f8;
            padding: 12px;
            border-radius: 8px;
        }

        .row {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        @media (max-width: 720px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>

<body>

    <h2>血液ガス分析（保存なし）</h2>

    <div class="grid">

        <div><label>pH</label><input id="ph" inputmode="decimal" placeholder="7.40"></div>

        <div><label>PaO2 (Torr)</label><input id="pao2" inputmode="decimal" placeholder="80"></div>

        <div><label>PaCO2 (Torr)</label><input id="paco2" inputmode="decimal" placeholder="40"></div>

        <div><label>HCO3 (mEq/L)</label><input id="hco3" inputmode="decimal" placeholder="24"></div>

        <div><label>Lac (mmol/L)</label><input id="lac" inputmode="decimal" placeholder="1.2"></div>

        <div><label>FiO2 (0-1)</label><input id="fio2" inputmode="decimal" placeholder="0.21"></div>

        <div><label>Na (mmol/L)</label><input id="na" inputmode="decimal" placeholder="140"></div>

        <div><label>K (mmol/L)</label><input id="k" inputmode="decimal" placeholder="4.0"></div>

        <div><label>Cl (mmol/L)</label><input id="cl" inputmode="decimal" placeholder="104"></div>

        <div><label>iCa (mmol/L)</label><input id="ca" inputmode="decimal" placeholder="1.1"></div>

        <div><label>Mg (mg/dL)</label><input id="mg" inputmode="decimal" placeholder="2.0"></div>

        <div><label>P (mg/dL)</label><input id="p" inputmode="decimal" placeholder="3.0"></div>

        <div><label>Alb (g/dL)</label><input id="alb" inputmode="decimal" placeholder="4.0"></div>

    </div>

    <div class="row">

        <button id="run" type="button">解析</button>

        <button id="clear" type="button">クリア</button>

    </div>

    <h3>結果（呼吸 + AG）</h3>

    <div id="out1" class="results">ここに結果が表示されます</div>

    <h3>結果（Stewart）</h3>

    <div id="out2" class="results">ここに結果が表示されます</div>

    <script src="./app.js"></script>

</body>

</html>
